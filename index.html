        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2420 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-widget {
            width: 100%;
            max-width: 420px;
            height: 600px;
            background: #faf8f5;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-header {
            background: linear-gradient(135deg, #3d2914 0%, #5c3d2e 100%);
            padding: 24px;
            color: #f5f0e8;
            position: relative;
            overflow: hidden;
        }

        .chat-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
        }

        .header-content {
            position: relative;
            z-index: 1;
        }

        .restaurant-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .header-subtitle {
            font-size: 0.875rem;
            opacity: 0.9;
            font-weight: 300;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
            font-size: 0.75rem;
            background: rgba(76, 175, 80, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #f5f0e8;
        }

        .message {
            max-width: 85%;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-bot {
            align-self: flex-start;
        }

        .message-user {
            align-self: flex-end;
        }

        .message-content {
            padding: 14px 18px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .message-bot .message-content {
            background: #ffffff;
            color: #2d2420;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .message-user .message-content {
            background: #3d2914;
            color: #f5f0e8;
            border-bottom-right-radius: 4px;
        }

        .message-time {
            font-size: 0.7rem;
            color: #8b7355;
            margin-top: 6px;
            margin-left: 4px;
        }

        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
            padding-left: 4px;
        }

        .quick-reply {
            background: transparent;
            border: 1.5px solid #3d2914;
            color: #3d2914;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .quick-reply:hover {
            background: #3d2914;
            color: #f5f0e8;
        }

        .whatsapp-btn {
            display: inline-block;
            background: #25D366;
            color: white;
            padding: 14px 28px;
            border-radius: 28px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            margin-top: 12px;
            border: none;
            cursor: pointer;

        }

            border-radius: 12px;

        .input-wrapper {

        }

        .chat-input {

            padding: 14px 18px;
            border: 1.5px solid #d4c4b0;
            border-radius: 24px;
            font-family: inherit;
            font-size: 0.95rem;

            transition: border-color 0.2s;

        }

        .chat-input:focus {

        }

        .send-btn {

            height: 44px;
            border-radius: 50%;
            background: #3d2914;
            color: #f5f0e8;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background 0.2s;
        }

        .send-btn:hover {

        }

        .typing-indicator {

            background: #ffffff;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            width: fit-content;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .typing-dot {
            width: 8px;
            height: 8px;

            border-radius: 50%;

        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typingBounce {

        }

        .hidden {

function getNext7Days() {
    const days = [];
    const today = new Date();
    const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    
    for (let i = 0; i < 7; i++) {
        const date = new Date(today);
        date.setDate(today.getDate() + i);
        
        const dayName = i === 0 ? 'Today' : (i === 1 ? 'Tomorrow' : dayNames[date.getDay()]);
        const dateStr = `${date.getDate()} ${monthNames[date.getMonth()]}`;
        const fullDate = `${date.getDate()} ${getMonthName(date.getMonth())} ${date.getFullYear()}`;
        
        days.push({
            value: fullDate,
            label: `${dayName}, ${dateStr}`
        });
    }
    
    return days;
}

function getMonthName(monthIndex) {
    const months = [
        'January', 'February', 'March', 'April', 'May', 'June',
        'July', 'August', 'September', 'October', 'November', 'December'
    ];
    return months[monthIndex];
}

function getTimeSlots() {
    const slots = [];
    const startHour = 8; // 8 AM
    const endHour = 22; // 10 PM
    
    for (let hour = startHour; hour <= endHour; hour++) {
        for (let min of [0, 30]) {
            const period = hour >= 12 ? 'PM' : 'AM';
            const displayHour = hour > 12 ? hour - 12 : (hour === 0 ? 12 : hour);
            const displayMin = min === 0 ? '00' : '30';
            const timeStr = `${displayHour}:${displayMin} ${period}`;
            const valueStr = `${hour.toString().padStart(2, '0')}:${displayMin}`;
            
            slots.push({
                value: timeStr,
                label: timeStr
            });
        }
    }
    
    return slots;
}

function getGuestOptions() {
    const options = [];
    for (let i = 1; i <= 10; i++) {
        options.push({
            value: i.toString(),
            label: i === 1 ? '1 Guest' : `${i} Guests`
        });
    }
    options.push({
        value: '10+',
        label: '10+ Guests'
    });
    return options;
}

function addMessage(text, isUser = false, extraHTML = '') {
    const messagesContainer = document.getElementById('chatMessages');
    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${isUser ? 'message-user' : 'message-bot'}`;
    
    let content = `<div class="message-content">${text}</div>
                   <div class="message-time">${getCurrentTime()}</div>`;
    
    if (extraHTML) {
        content += extraHTML;
    }
    
    messageDiv.innerHTML = content;
    messagesContainer.appendChild(messageDiv);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

function showTyping() {
    const messagesContainer = document.getElementById('chatMessages');
    const typingDiv = document.createElement('div');
    typingDiv.className = 'message message-bot typing-indicator-container';
    typingDiv.id = 'typingIndicator';
    typingDiv.innerHTML = `
        <div class="typing-indicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>
    `;
    messagesContainer.appendChild(typingDiv);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

function hideTyping() {
    const typing = document.getElementById('typingIndicator');
    if (typing) typing.remove();
}

function createQuickReplies(options) {
    return `<div class="quick-replies">
        ${options.map(opt => `<button class="quick-reply" onclick="handleQuickReply('${opt}')">${opt}</button>`).join('')}
    </div>`;
}

function formatMenuCategory(categoryKey) {
    const category = menuData[categoryKey];
    if (!category) return '';
    
    let html = `<div class="menu-category">
        <div class="menu-category-title">${category.title}</div>`;
    
    category.items.forEach(item => {
        html += `<div class="menu-item">
            <span class="menu-item-name">${item.name}</span>
            <span class="menu-item-price">${item.price}</span>
        </div>`;
    });
    
    html += '</div>';
    return html;
}

function submitBookingForm() {
    const name = document.getElementById('bookingName').value.trim();
    const guests = document.getElementById('bookingGuests').value;
    const date = document.getElementById('bookingDate').value;
    const time = document.getElementById('bookingTime').value;
    const phone = document.getElementById('bookingPhone').value.trim();
    
    // Validation
    if (!name || !guests || !date || !time || !phone) {
        addMessage("My apologies, but it seems you've missed a field. Please fill in all the details to proceed.", false, '');
        return;
    }
    
    // Validate time is in future if today
    const selectedDate = new Date(date);
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    
    if (selectedDate.getTime() === today.getTime()) {
        const now = new Date();
        const [timeStr, period] = time.split(' ');
        const [hours, minutes] = timeStr.split(':').map(Number);
        let24Hours = hours;
        
        if (period === 'PM' && hours !== 12) let24Hours += 12;
        if (period === 'AM' && hours === 12) let24Hours = 0;
        
        const selectedTime = new Date();
        selectedTime.setHours(let24Hours, minutes, 0, 0);
        
        if (selectedTime <= now) {
            addMessage("My apologies, but that time has already passed. Please select a future time.", false, '');
            return;
        }
    }
    
    // Store booking data
    const bookingSummary = {
        name: name,
        guests: guests,
        date: date,
        time: time,
        phone: phone
    };
    
    // Generate WhatsApp message
    const customerMessage = `Hi Matteo Coffee, I would like to book a table.%0A%0A` +
        `*Name:* ${bookingSummary.name}%0A` +
        `*Guests:* ${bookingSummary.guests}%0A` +
        `*Date:* ${bookingSummary.date}%0A` +
        `*Time:* ${bookingSummary.time}%0A` +
        `*My Phone:* ${bookingSummary.phone}`;
    
    const ownerWhatsAppNumber = '918861005767';
    currentWhatsAppUrl = `https://wa.me/${ownerWhatsAppNumber}?text=${customerMessage}`;
    
    resetBookingState();
    
    addMessage("Splendid! Please click the button below to send your booking request to us via WhatsApp:", false, 
        `<div style="margin-top: 16px; text-align: center;">
            <button onclick="openWhatsApp()" class="whatsapp-btn">
                📱 Send Booking to Matteo Coffee
            </button>
            <p style="font-size: 0.8rem; color: #666; margin-top: 8px;">This opens WhatsApp with your booking details ready to send</p>
        </div>
        <div style="margin-top: 16px; padding: 12px; background: #f5f0e8; border-radius: 8px; font-size: 0.9rem;">
            <strong>📋 Your Booking:</strong><br>
            Name: ${bookingSummary.name}<br>
            Guests: ${bookingSummary.guests}<br>
            Date: ${bookingSummary.date}<br>
            Time: ${bookingSummary.time}<br>
            Phone: ${bookingSummary.phone}
        </div>` + createQuickReplies(['Show me the menu', 'Make another booking'])
    );
}

function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    
    if (!text) return;
    
    addMessage(text, true);
    input.value = '';
    
    showTyping();
    
    setTimeout(() => {
        hideTyping();
        const response = processUserInput(text);
        addMessage(response.text, false, response.html);
    }, 1000 + Math.random() * 500);
}

        const greeting = botPersonality.greetings[0];

    }, 500);
    
    document.getElementById('userInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
});
